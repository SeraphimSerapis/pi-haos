services:
  pi-agent:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - '8099:8099'
    environment:
      NODE_ENV: development
      APP_VERSION: 0.1.0-dev
    volumes:
      - ./dev-fixtures/homeassistant:/homeassistant:ro
      - pi-agent-data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
volumes:
  pi-agent-data:
