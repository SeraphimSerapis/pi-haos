configuration:
  log_level:
    name: Log level
    description: Application logging verbosity.
  diagnostics:
    name: Diagnostics
    description: Enable additional local diagnostics without sending data externally.
  independent_pi_updates:
    name: Independent Pi updates
    description: Allow manually initiated Pi runtime updates from the App UI.
  terminal_enabled:
    name: Enable Pi TUI
    description: Allow the native Pi interactive TUI through Home Assistant Ingress.
  default_provider:
    name: Default provider
    description: Pi provider identifier used by the interactive terminal.
  default_model:
    name: Default model
    description: Model identifier used by the interactive terminal.
  model_catalog:
    name: Model catalogue
    description: Provider and model definitions passed to Pi at startup.
